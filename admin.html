<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #12192f;
      --bg-3: #1b2250;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      color: white;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 25%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.25), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
    }

    .app {
      max-width: 1200px;
      margin: auto;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    .header, .form-box, .file-row {
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 800;
    }

    .header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 12px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .green { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .red { background: linear-gradient(135deg, #ef4444, #dc2626); }
    .gray { background: rgba(255,255,255,0.08); }

    .form-box h2 {
      margin-bottom: 18px;
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 14px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      margin-top: 14px;
    }

    .submit-row {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .files-list {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .file-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .file-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 260px;
    }

    .icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    .file-left h3 {
      font-size: 18px;
      font-weight: 700;
    }

    .file-left p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .tag {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      font-weight: 700;
      min-height: 20px;
    }

    .success { color: #4ade80; }
    .error { color: #f87171; }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .actions, .submit-row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header glass">
      <div>
        <h1>⚙️ Admin Panel</h1>
        <p>Manage dashboard files: add, edit, delete, and protect.</p>
      </div>
      <div class="actions">
        <button class="blue" onclick="window.location.href='dashboard.html'">Open Dashboard</button>
        <button class="red" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="form-box glass">
      <h2 id="formTitle">Add New File</h2>

      <div class="grid">
        <input type="text" id="fileName" placeholder="File Name" />
        <input type="text" id="fileType" placeholder="File Type (ZIP, PDF, MP4...)" />
        <input type="text" id="fileSize" placeholder="File Size (e.g. 24 MB)" />
        <input type="text" id="fileIcon" placeholder="Emoji Icon (📁, 🎬, 💻...)" />
        <input type="url" id="fileLink" placeholder="File Download Link" />
        <select id="fileProtected">
          <option value="true">Protected</option>
          <option value="false">Open</option>
        </select>
      </div>

      <textarea id="fileInfo" placeholder="File description / info..."></textarea>

      <div class="submit-row">
        <button class="green" onclick="saveFile()">Save File</button>
        <button class="gray" onclick="resetForm()">Clear</button>
      </div>

      <div class="message" id="message"></div>
    </div>

    <div class="files-list" id="filesList"></div>
  </div>

  <script>
    "use strict";

    if (localStorage.getItem("admin_logged_in") !== "true") {
      window.location.href = "login.html";
    }

    const STORAGE_KEY = "dashboard_files_v3";
    let editId = null;

    const defaultFiles = [
      {
        id: crypto.randomUUID(),
        name: "Project Files",
        type: "ZIP Archive",
        size: "24 MB",
        icon: "📦",
        info: "Main project archive with assets and packaged build.",
        link: "https://example.com/file1.zip",
        protected: true
      },
      {
        id: crypto.randomUUID(),
        name: "Design Pack",
        type: "RAR Archive",
        size: "18 MB",
        icon: "🎨",
        info: "Design resources and templates.",
        link: "https://example.com/file2.zip",
        protected: true
      },
      {
        id: crypto.randomUUID(),
        name: "Source Code",
        type: "Folder",
        size: "12 MB",
        icon: "💻",
        info: "Frontend + backend source package.",
        link: "https://example.com/file3.zip",
        protected: true
      }
    ];

    function getFiles() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultFiles));
        return defaultFiles;
      }
      try {
        return JSON.parse(saved);
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultFiles));
        return defaultFiles;
      }
    }

    function saveFilesToStorage(files) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(files));
    }

    function renderFiles() {
      const files = getFiles();
      const list = document.getElementById("filesList");
      list.innerHTML = "";

      files.forEach(file => {
        const row = document.createElement("div");
        row.className = "file-row glass";

        row.innerHTML = `
          <div class="file-left">
            <div class="icon">${escapeHTML(file.icon || "📁")}</div>
            <div>
              <h3>${escapeHTML(file.name)}</h3>
              <p>${escapeHTML(file.type)} • ${escapeHTML(file.size)}</p>
              <span class="tag">${file.protected ? "Protected" : "Open"}</span>
            </div>
          </div>

          <div class="actions">
            <button class="blue" onclick="editFile('${file.id}')">Edit</button>
            <button class="red" onclick="deleteFile('${file.id}')">Delete</button>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function saveFile() {
      const name = document.getElementById("fileName").value.trim();
      const type = document.getElementById("fileType").value.trim();
      const size = document.getElementById("fileSize").value.trim();
      const icon = document.getElementById("fileIcon").value.trim() || "📁";
      const link = document.getElementById("fileLink").value.trim();
      const info = document.getElementById("fileInfo").value.trim();
      const isProtected = document.getElementById("fileProtected").value === "true";
      const msg = document.getElementById("message");

      if (!name || !type || !size || !link) {
        msg.textContent = "Please fill in all required fields.";
        msg.className = "message error";
        return;
      }

      let files = getFiles();

      if (editId) {
        files = files.map(file =>
          file.id === editId
            ? { ...file, name, type, size, icon, link, info, protected: isProtected }
            : file
        );
        msg.textContent = "File updated successfully.";
      } else {
        files.push({
          id: crypto.randomUUID(),
          name,
          type,
          size,
          icon,
          link,
          info,
          protected: isProtected
        });
        msg.textContent = "File added successfully.";
      }

      msg.className = "message success";
      saveFilesToStorage(files);
      resetForm();
      renderFiles();
    }

    function editFile(id) {
      const files = getFiles();
      const file = files.find(f => f.id === id);
      if (!file) return;

      editId = id;

      document.getElementById("formTitle").textContent = "Edit File";
      document.getElementById("fileName").value = file.name;
      document.getElementById("fileType").value = file.type;
      document.getElementById("fileSize").value = file.size;
      document.getElementById("fileIcon").value = file.icon;
      document.getElementById("fileLink").value = file.link;
      document.getElementById("fileInfo").value = file.info || "";
      document.getElementById("fileProtected").value = String(file.protected);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteFile(id) {
      if (!confirm("Delete this file?")) return;

      let files = getFiles();
      files = files.filter(file => file.id !== id);
      saveFilesToStorage(files);
      renderFiles();

      const msg = document.getElementById("message");
      msg.textContent = "File deleted successfully.";
      msg.className = "message success";
    }

    function resetForm() {
      editId = null;
      document.getElementById("formTitle").textContent = "Add New File";
      document.getElementById("fileName").value = "";
      document.getElementById("fileType").value = "";
      document.getElementById("fileSize").value = "";
      document.getElementById("fileIcon").value = "";
      document.getElementById("fileLink").value = "";
      document.getElementById("fileInfo").value = "";
      document.getElementById("fileProtected").value = "true";
    }

    function logout() {
      localStorage.removeItem("admin_logged_in");
      window.location.href = "login.html";
    }

    function escapeHTML(str = "") {
      return str.replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[m]);
    }

    renderFiles();
  </script>
</body>
</html>
