<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: white;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 25%),
        radial-gradient(circle at bottom right, rgba(139,92,246,0.25), transparent 25%),
        linear-gradient(135deg, #0b1020, #12192f, #1b2250);
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 18px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 34px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      box-shadow: 0 14px 28px rgba(59,130,246,0.25);
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 22px;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 15px;
      margin-bottom: 14px;
      text-align: center;
    }

    button {
      width: 100%;
      border: none;
      padding: 14px 18px;
      border-radius: 16px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .back-btn {
      margin-top: 12px;
      background: rgba(255,255,255,0.08);
    }

    .message {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      font-weight: 600;
    }

    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Admin Login</h1>
    <p>Enter admin credentials to continue.</p>

    <input type="text" id="username" placeholder="Username" autocomplete="off" />
    <input type="password" id="password" placeholder="Password" autocomplete="off" />

    <button onclick="login()">Login</button>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>

    <div class="message" id="message"></div>
  </div>

  <script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "1152";

    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();
      const msg = document.getElementById("message");

      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        localStorage.setItem("admin_logged_in", "true");
        msg.textContent = "Login successful. Redirecting...";
        msg.className = "message success";

        setTimeout(() => {
          window.location.href = "admin.html";
        }, 700);
      } else {
        msg.textContent = "Wrong username or password!";
        msg.className = "message error";
      }
    }

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
