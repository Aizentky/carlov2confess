<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy valentines my baby scarlette!!!!</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap'); /* cursive font */

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #d8b4ff, #a084fc); /* light purple */
  font-family: 'Dancing Script', cursive; /* cursive font */
  color: white;
  cursor: pointer;
  overflow: hidden;
}

/* envelope */
.envelope {
  position: relative;
  width: 500px;   /* bigger box */
  height: 320px;  /* bigger box */
  background: #c084fc; /* light purple */
  border-radius: 15px;
  box-shadow: 0 0 35px rgba(200, 100, 255, 0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 1s;
}

.flap {
  position: absolute;
  top: 0;
  width: 0;
  height: 0;
  border-left: 250px solid transparent;
  border-right: 250px solid transparent;
  border-bottom: 160px solid #d8b4ff;
  transform-origin: top;
  transition: 1s;
}

.open .flap {
  transform: rotateX(180deg);
}

/* letter */
.letter {
  position: absolute;
  width: 420px;   /* bigger letter */
  background: #e0b3ff; /* lighter purple */
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  transform: translateY(60px);
  opacity: 0;
  transition: 1s;
  font-family: 'Dancing Script', cursive; /* cursive text */
}

.open .letter {
  transform: translateY(-80px);
  opacity: 1;
}

h1 {
  margin-top: 0;
  color: #9f7aea;
}

p {
  font-size: 20px; /* slightly bigger text */
  line-height: 1.6;
  min-height: 140px;
}

.signature {
  margin-top: 15px;
  font-size: 24px; /* bigger signature */
  color: #7f5af0;
  font-family: 'Dancing Script', cursive;
}

/* glowing */
.letter {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 20px rgba(200, 100, 255, 0.5); }
  to { box-shadow: 0 0 45px rgba(220, 120, 255, 0.9); }
}

/* floating hearts */
.heart {
  position: absolute;
  color: #d9a6ff;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  from { transform: translateY(100vh) scale(1); opacity: 0.7; }
  to { transform: translateY(-10vh) scale(1.5); opacity: 0; }
}

/* volume slider */
.volume {
  position: fixed;
  bottom: 20px;
  right: 20px;
}
</style>
</head>

<body>

<audio id="bgMusic" src="https://raw.githubusercontent.com/Aizentky/angelicav2/main/kalapastanganAudio.mp4"></audio>

<div class="envelope" id="envelope">
  <div class="flap"></div>

  <div class="letter">
    <h1>To you</h1>
    <p id="typedText"></p>
    <p class="signature">– carloo&lt;3</p>
  </div>
</div>

<input type="range" min="0" max="1" step="0.01" value="1" class="volume" id="volumeSlider">

<script>
const envelope = document.getElementById("envelope");
const music = document.getElementById("bgMusic");
const text = "I will be honest. I felt like I missed an opportunity asking you out. I had a huge crush on you, but I was too much of a pussy to ask you out, even if you said no. You're very pretty, and I love all your outfits and your behavior. I love everything you do, and I love talking with you all the time. I was always happy when we interacted.I just want you to know my feelings for you. I know this is weird for me, but at least I'm spreading my feelings out. I'm really shy. I'm a torpe guy, if you want to know. I don't really know how to express my feelings. It's my first time. I'm not expecting you to accept my feelings. If this ruins our friendship, I'll take the risk.Let me guess, you probably have a boyfriend, and that's okay for me. I don't want any trouble. I just want to express my feelings. I know I'm not fit for you. I'm kind of weird. And I just want to know what you think of me, even if it's negative. I'm just looking for closure so I can move on.";
const typedText = document.getElementById("typedText");
const volumeSlider = document.getElementById("volumeSlider");

let index = 0;
let opened = false;

/* click anywhere */
document.body.addEventListener("click", () => {
  if (!opened) {
    envelope.classList.add("open");
    music.play();
    typeText();
    opened = true;
  }
}, { once: true });

/* typing effect */
function typeText() {
  if (index < text.length) {
    typedText.innerHTML += text.charAt(index);
    index++;
    setTimeout(typeText, 40);
  }
}

/* volume control */
volumeSlider.addEventListener("input", () => {
  music.volume = volumeSlider.value;
});

/* floating hearts */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💜";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
